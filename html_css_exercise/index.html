<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML+CSS Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">
        <img src="./images/logo.png" class="logo" />
        <h3>PHOENIX</h3>
      </div>
      <div></div>
      <ul>
        <li><a href="https://example.com">HOME</a></li>
        <li><a href="https://example.com">ABOUT</a></li>
        <li><a href="https://example.com">GAMES</a></li>
        <li><a href="https://example.com">BLOG</a></li>
        <li><a href="https://example.com">CONTACT</a></li>
        <li><a href="https://example.com">BUY TICKET</a></li>
      </ul>
    </header>
    <main>
      <div>
        <h1 class="club-name">
          FIELDRUN <br />
          BASEBALL CLUB
        </h1>
        <p class="club-description">
          A small river named Duden flows by their place and supplies it <br />
          with the necessary regelialia.
        </p>
        <button class="watch-match">Watch match</button>
        <button class="get-tickets">Get tickets</button>
      </div>
    </main>
    <footer>
      <div class="match-info">
        <div class="team">
          <img src="./images/images.jpg" class="team-logo" />
          <p>PHOENIX</p>
        </div>
        <p>vs</p>
        <div class="team">
          <img src="./images/images (1).jpg" class="team-logo" />
          <p>JACKSONVILLE</p>
        </div>
      </div>
      <div>
        <h2 class="league-name">Baseball Champions League</h2>
        <p>Semi-Final</p>
      </div>
      <table>
        <tr>
          <th>171</th>
          <th>11</th>
          <th>10</th>
          <th>39</th>
        </tr>
        <tr>
          <td>Days</td>
          <td>Hours</td>
          <td>Minutes</td>
          <td>Seconds</td>
        </tr>
      </table>
      <button class="buy-tickets">Buy Tickets</button>
    </footer>
  </body>
</html>
